<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#E2E8F0"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155" />
    </marker>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)" />

  <text x="70" y="90" font-family="Segoe UI, Arial, sans-serif" font-size="44" fill="#0F172A" font-weight="700">Sales Tracker Journey</text>
  <text x="70" y="130" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#334155">From your computer to a live website</text>

  <rect x="70" y="220" width="250" height="160" rx="16" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="95" y="275" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#1E3A8A" font-weight="700">1. Local App</text>
  <text x="95" y="315" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1E3A8A">Run on your PC</text>
  <text x="95" y="345" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#1E3A8A">Check if it works</text>

  <rect x="390" y="220" width="250" height="160" rx="16" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text x="415" y="275" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#14532D" font-weight="700">2. Supabase</text>
  <text x="415" y="315" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#14532D">Create database</text>
  <text x="415" y="345" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#14532D">Add API keys</text>

  <rect x="710" y="220" width="250" height="160" rx="16" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
  <text x="735" y="275" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#7F1D1D" font-weight="700">3. GitHub</text>
  <text x="735" y="315" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#7F1D1D">Push project files</text>
  <text x="735" y="345" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#7F1D1D">Add secrets</text>

  <rect x="950" y="470" width="200" height="140" rx="16" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2"/>
  <text x="975" y="530" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#4C1D95" font-weight="700">4. Live Site</text>
  <text x="975" y="565" font-family="Segoe UI, Arial, sans-serif" font-size="19" fill="#4C1D95">GitHub Pages</text>

  <line x1="320" y1="300" x2="390" y2="300" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="640" y1="300" x2="710" y2="300" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="930" y1="380" x2="1025" y2="470" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="70" y="640" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0F172A">Goal: Recreate the app and publish it so anyone with the link can use it.</text>
</svg>
