<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" fill="none">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#334155" />
    </marker>
  </defs>
  <rect width="1200" height="700" fill="#F8FAFC"/>
  <text x="70" y="90" font-family="Segoe UI, Arial, sans-serif" font-size="42" fill="#0F172A" font-weight="700">Step 6: Run Locally, Then Deploy</text>

  <rect x="90" y="180" width="460" height="370" rx="18" fill="#EEF2FF" stroke="#4338CA" stroke-width="2"/>
  <text x="130" y="240" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#312E81" font-weight="700">Local Test</text>
  <text x="130" y="295" font-family="Consolas, monospace" font-size="25" fill="#312E81">npm install</text>
  <text x="130" y="335" font-family="Consolas, monospace" font-size="25" fill="#312E81">npm run dev</text>
  <text x="130" y="390" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#312E81">Open: http://localhost:5173/sales-tracker</text>

  <rect x="650" y="180" width="460" height="370" rx="18" fill="#FFF7ED" stroke="#F97316" stroke-width="2"/>
  <text x="690" y="240" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#9A3412" font-weight="700">GitHub Deploy</text>
  <text x="690" y="295" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#9A3412">1. Push to main branch</text>
  <text x="690" y="330" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#9A3412">2. GitHub Actions runs build</text>
  <text x="690" y="365" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#9A3412">3. Pages publishes dist/</text>
  <text x="690" y="420" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#9A3412">Your live URL appears in Actions</text>

  <line x1="550" y1="365" x2="650" y2="365" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="70" y="640" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#334155">Final check: Home, Inventory, Sales pages all load and save data.</text>
</svg>
