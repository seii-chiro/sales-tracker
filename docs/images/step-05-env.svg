<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" fill="none">
  <rect width="1200" height="680" fill="#F8FAFC"/>
  <text x="70" y="90" font-family="Segoe UI, Arial, sans-serif" font-size="42" fill="#0F172A" font-weight="700">Step 5: Add Environment Keys</text>

  <rect x="120" y="170" width="960" height="380" rx="20" fill="#111827"/>
  <text x="170" y="250" font-family="Consolas, monospace" font-size="32" fill="#93C5FD">.env</text>
  <text x="170" y="320" font-family="Consolas, monospace" font-size="28" fill="#F9FAFB">VITE_SUPABASE_URL=your_project_url</text>
  <text x="170" y="380" font-family="Consolas, monospace" font-size="28" fill="#F9FAFB">VITE_SUPABASE_PUBLISHABLE_KEY=your_anon_key</text>

  <text x="70" y="620" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#334155">Important: Do not paste your real keys in public screenshots or tutorials.</text>
</svg>
