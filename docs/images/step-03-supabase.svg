<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" fill="none">
  <rect width="1200" height="700" fill="#F8FAFC"/>
  <text x="70" y="90" font-family="Segoe UI, Arial, sans-serif" font-size="42" fill="#0F172A" font-weight="700">Step 3: Create a Supabase Project</text>

  <rect x="90" y="160" width="1020" height="450" rx="20" fill="#ECFDF5" stroke="#16A34A" stroke-width="2"/>
  <text x="130" y="230" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#14532D" font-weight="700">Inside Supabase Dashboard</text>

  <rect x="130" y="270" width="280" height="270" rx="14" fill="#FFFFFF" stroke="#16A34A" stroke-width="2"/>
  <text x="160" y="330" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#14532D" font-weight="700">1. New Project</text>
  <text x="160" y="370" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#14532D">Name it</text>
  <text x="160" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#14532D">sales-tracker</text>

  <rect x="460" y="270" width="280" height="270" rx="14" fill="#FFFFFF" stroke="#16A34A" stroke-width="2"/>
  <text x="490" y="330" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#14532D" font-weight="700">2. SQL Editor</text>
  <text x="490" y="370" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#14532D">Paste setup script</text>
  <text x="490" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#14532D">Run once</text>

  <rect x="790" y="270" width="280" height="270" rx="14" fill="#FFFFFF" stroke="#16A34A" stroke-width="2"/>
  <text x="820" y="330" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#14532D" font-weight="700">3. API Keys</text>
  <text x="820" y="370" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#14532D">Copy URL</text>
  <text x="820" y="400" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#14532D">Copy anon key</text>

  <text x="70" y="660" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#334155">These keys connect your app to your database.</text>
</svg>
