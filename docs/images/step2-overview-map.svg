<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" fill="none">
  <rect width="1200" height="680" fill="#F8FAFC"/>
  <text x="70" y="90" font-family="Segoe UI, Arial, sans-serif" font-size="42" fill="#0F172A" font-weight="700">Build-From-Scratch Overview</text>
  <text x="70" y="130" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#334155">High-level path for recreating the app code</text>

  <rect x="80" y="190" width="300" height="140" rx="16" fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="110" y="245" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#1E3A8A" font-weight="700">1. Scaffold</text>
  <text x="110" y="285" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#1E3A8A">Vite + React + TS</text>

  <rect x="450" y="190" width="300" height="140" rx="16" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text x="480" y="245" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#14532D" font-weight="700">2. Structure</text>
  <text x="480" y="285" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#14532D">Router + pages + UI</text>

  <rect x="820" y="190" width="300" height="140" rx="16" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="850" y="245" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#92400E" font-weight="700">3. Data Layer</text>
  <text x="850" y="285" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#92400E">Supabase + services</text>

  <rect x="260" y="390" width="300" height="140" rx="16" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
  <text x="290" y="445" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#7F1D1D" font-weight="700">4. Features</text>
  <text x="290" y="485" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#7F1D1D">Inventory + checkout</text>

  <rect x="640" y="390" width="300" height="140" rx="16" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2"/>
  <text x="670" y="445" font-family="Segoe UI, Arial, sans-serif" font-size="30" fill="#4C1D95" font-weight="700">5. Deploy</text>
  <text x="670" y="485" font-family="Segoe UI, Arial, sans-serif" font-size="21" fill="#4C1D95">GitHub Pages</text>

  <path d="M380 260 L450 260" stroke="#334155" stroke-width="4"/>
  <path d="M750 260 L820 260" stroke="#334155" stroke-width="4"/>
  <path d="M970 330 L840 390" stroke="#334155" stroke-width="4"/>
  <path d="M550 460 L640 460" stroke="#334155" stroke-width="4"/>

  <text x="70" y="620" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#334155">This is a broad blueprint, not a line-by-line coding tutorial.</text>
</svg>
