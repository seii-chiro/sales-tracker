<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" fill="none">
  <rect width="1200" height="700" fill="#F8FAFC"/>
  <text x="70" y="90" font-family="Segoe UI, Arial, sans-serif" font-size="42" fill="#0F172A" font-weight="700">Tech Stack Used</text>

  <rect x="90" y="170" width="480" height="120" rx="14" fill="#E0F2FE" stroke="#0284C7" stroke-width="2"/>
  <text x="120" y="215" font-family="Segoe UI, Arial, sans-serif" font-size="27" fill="#0C4A6E" font-weight="700">Frontend</text>
  <text x="120" y="245" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#0C4A6E" font-weight="700">React 19 + TypeScript + Vite 8</text>
  <text x="120" y="275" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#0C4A6E">Fast UI development with type safety</text>

  <rect x="620" y="170" width="480" height="120" rx="14" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text x="650" y="220" font-family="Segoe UI, Arial, sans-serif" font-size="27" fill="#14532D" font-weight="700">Backend Service: Supabase</text>
  <text x="650" y="250" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#14532D">Postgres DB + storage bucket + API</text>

  <rect x="90" y="330" width="480" height="120" rx="14" fill="#FEF9C3" stroke="#CA8A04" stroke-width="2"/>
  <text x="120" y="380" font-family="Segoe UI, Arial, sans-serif" font-size="27" fill="#713F12" font-weight="700">Styling: Tailwind CSS 4</text>
  <text x="120" y="410" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#713F12">Utility classes for fast UI styling</text>

  <rect x="620" y="330" width="480" height="120" rx="14" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2"/>
  <text x="650" y="380" font-family="Segoe UI, Arial, sans-serif" font-size="27" fill="#4C1D95" font-weight="700">Routing: React Router 7</text>
  <text x="650" y="410" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#4C1D95">Home, Inventory, and Sales pages</text>

  <rect x="355" y="490" width="490" height="120" rx="14" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
  <text x="385" y="535" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#7F1D1D" font-weight="700">Deployment</text>
  <text x="385" y="565" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#7F1D1D" font-weight="700">GitHub Actions + GitHub Pages</text>
  <text x="385" y="590" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#7F1D1D">Builds on push, then publishes site</text>
</svg>
